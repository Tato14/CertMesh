name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (no cloud extras — runs fully offline)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,i18n]"

      - name: Lint (ruff)
        run: python -m ruff check src app evals tests

      - name: Secret scan (no committed .env, no obvious keys)
        run: |
          if git ls-files | grep -E '^\.env$'; then echo "::error::.env must not be committed"; exit 1; fi
          if git grep -nE '(AZURE_AI_API_KEY|AZURE_SEARCH_API_KEY)\s*=\s*[A-Za-z0-9]{12,}' -- '*.py' '*.md' '*.toml'; then
            echo "::error::possible hard-coded secret"; exit 1; fi
          echo "secret scan clean"

      - name: Tests
        run: python -m pytest -q

      - name: Evaluation gate (grounding == 1.0, PII == 0, redteam == 1.0, routing, capacity, abstention)
        run: python -m evals.run_evals
